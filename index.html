    /* ─── Scroll Reveal Hook ─────────────────────────────────────────── */
    function useReveal(rootMargin = '0px 0px -60px 0px') {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add('visible');
            });
          },
          { threshold: 0.08, rootMargin }
        );
        const targets = el.querySelectorAll('.reveal, .reveal-left, .reveal-right');
        targets.forEach((t) => observer.observe(t));
        return () => observer.disconnect();
      }, []);
      return ref;
    }

                    <input type="text" name="nombre" value={form.nombre} onChange={handleChange} placeholder="Tu nombre completo" required

                      style={{background:'rgba(255,255,255,0.06)'}} />
                  </div>
                  <div>
                    <label className="block text-white/60 text-xs font-medium mb-1.5">Email</label>
                    <input type="email" name="email" value={form.email} onChange={handleChange} placeholder="tu@email.com" required
                      className="w-full border border-white/15 text-white placeholder-white/25 rounded-xl px-4 py-3 text-sm transition-all duration-200"
                      style={{background:'rgba(255,255,255,0.06)'}} />
                  </div>
                  <div>
                    <label className="block text-white/60 text-xs font-medium mb-1.5">Teléfono / Whatsapp</label>
                    <input type="tel" name="telefono" value={form.telefono} onChange={handleChange} placeholder="+56 9 XXXX XXXX"
                      className="w-full border border-white/15 text-white placeholder-white/25 rounded-xl px-4 py-3 text-sm transition-all duration-200"
                      style={{background:'rgba(255,255,255,0.06)'}} />
                  </div>
                  <div>
                    <label className="block text-white/60 text-xs font-medium mb-1.5">Selecciona tu interés</label>
                    <select name="interes" value={form.interes} onChange={handleChange} required
                      className="w-full border border-white/15 text-white rounded-xl px-4 py-3 text-sm transition-all duration-200 cursor-pointer"
                      style={{background:'rgba(255,255,255,0.06)'}}>
                      <option value="" disabled style={{color:'#333',background:'#1a1035'}}>Elige una opción</option>
                      <option value="Quiero abrir una franquicia" style={{color:'#111',background:'#fff'}}>Quiero abrir una franquicia</option>
                      <option value="Quiero franquiciar mi marca" style={{color:'#111',background:'#fff'}}>Quiero franquiciar mi marca</option>
                      <option value="Quiero recibir asesoría general" style={{color:'#111',background:'#fff'}}>Quiero recibir asesoría general</option>
                    </select>
                  </div>
                  <button type="submit"
                    className={`w-full font-bold py-3.5 rounded-xl transition-all duration-200 text-sm shadow-lg active:scale-[0.98] text-white ${sent ? 'bg-green-500 cursor-default' : 'bg-[#4776e4] hover:bg-[#3a65d4]'}`}>
                    {sent ? '¡Mensaje enviado!' : 'Agendar asesoría gratuita'}
                  </button>
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Footer ─────────────────────────────────────────────────────── */
    function Footer() {
      const c = useSection('footer');
      const description  = c.description    ?? 'Conecta Franquicias es una empresa de Conecta Grupo Estratégico SpA, dedicada al corretaje y desarrollo de franquicias en Chile. Profesionalizamos el crecimiento de las marcas y conectamos a las personas con oportunidades de inversión confiables.';
      const address      = c.address        ?? 'Ñuñoa, Santiago de Chile';
      const email        = c.email          ?? 'contacto@conectafranquicias.cl';
      const phoneDisplay = c.phone_display  ?? '+56 9 8730 5289';
      const waNumber     = c.whatsapp_number ?? '56987305289';
      const copyright    = c.copyright      ?? '© 2025 Conecta Franquicias. Todos los derechos reservados.';
      const footerSub    = c.footer_sub     ?? 'Una empresa de Conecta Grupo Estratégico SpA';
      const navLinks = ['Beneficios', 'Servicios', 'Cómo Funciona', 'Contáctanos'];

      return (
        <footer className="bg-[#13111f] py-14 border-t border-white/5">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 lg:gap-16 mb-10">
              <div className="lg:col-span-1">
                <Logo white />
                <p className="text-white/35 text-xs font-light leading-relaxed mt-4 max-w-xs">{description}</p>
              </div>
              <div>
                <h4 className="text-white/70 font-semibold text-sm mb-5 tracking-wide">Navegación</h4>
                <ul className="space-y-3">
                  {navLinks.map((item) => (
                    <li key={item}>
                      <a href={`#${item.toLowerCase().replace(' ', '')}`}
                        className="text-white/35 hover:text-white/65 text-xs transition-colors duration-200">
                        {item}
                      </a>
                    </li>
                  ))}
                </ul>
              </div>
              <div>
                <h4 className="text-white/70 font-semibold text-sm mb-5 tracking-wide">Contacto</h4>
                <div className="space-y-3.5">
                  <div className="flex items-start gap-2.5">
                    <svg className="w-4 h-4 text-[#8d54e7] mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span className="text-white/35 text-xs">{address}</span>
                  </div>
                  <div className="flex items-start gap-2.5">
                    <svg className="w-4 h-4 text-[#8d54e7] mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <a href={`mailto:${email}`} className="text-white/35 hover:text-white/60 text-xs transition-colors duration-200">{email}</a>
                  </div>
                  <div className="flex items-start gap-2.5">
                    <svg className="w-4 h-4 text-[#25D366] mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.464 3.488" />
                    </svg>
                    <a href={`https://api.whatsapp.com/send/?phone=${waNumber}`} target="_blank" rel="noopener noreferrer"
                      className="text-white/35 hover:text-white/60 text-xs transition-colors duration-200">
                      {phoneDisplay}
                    </a>
                  </div>
                </div>
              </div>
            </div>
            <div className="border-t border-white/5 pt-7 flex flex-col sm:flex-row justify-between items-center gap-3">
              <p className="text-white/20 text-xs">{copyright}</p>
              <p className="text-white/20 text-xs">{footerSub}</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── WhatsApp Float ─────────────────────────────────────────────── */
    function WhatsApp() {
      const c = useSection('footer');
      const waNumber = c.whatsapp_number ?? '56987305289';
      return (
        <a href={`https://api.whatsapp.com/send/?phone=${waNumber}`}
          target="_blank" rel="noopener noreferrer"
          className="wa-btn fixed bottom-6 right-5 z-50 w-14 h-14 rounded-full flex items-center justify-center text-white"
          aria-label="Contactar por WhatsApp">
          <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.464 3.488" />
          </svg>
        </a>
      );
    }

    /* ─── App ────────────────────────────────────────────────────────── */
    function App() {
      const [content, setContent] = useState(null);

      useEffect(() => {
        const sections = ['hero','socio','porque','servicios','proceso','faq','cta','contacto','footer'];
        Promise.all(
          sections.map(s => fetch(`content/${s}.json`).then(r => r.json()).catch(() => ({})))
        ).then(results => {
          const obj = {};
          sections.forEach((s, i) => { obj[s] = results[i]; });
          setContent(obj);
        });
      }, []);

      return (
        <ContentCtx.Provider value={content}>
          <Navbar />
          <main>
            <Hero />
            <SocioEstrategico />
            <PorQueElegir />
            <Servicios />
            <Proceso />
            <FAQ />
            <CTABanner />
            <Contacto />
          </main>
          <Footer />
          <WhatsApp />
        </ContentCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
